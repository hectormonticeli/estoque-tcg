<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeStock - Meu Estoque</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header>
        <h1>PokeStock</h1>
        <nav>
            <a href="index.html" class="active">Meu Estoque</a>
            <a href="busca.html">Buscar Cartas</a>
        </nav>
    </header>

    <div class="stats-panel" id="statsPanel">
        Valor Total do Estoque: R$ 0,00
    </div>

    <div class="container">
        <div class="search-container">
            <input type="text" id="filterName" placeholder="Filtrar por nome no estoque..." oninput="filtrarEstoque()">
            <select id="filterRarity" onchange="filtrarEstoque()">
                <option value="">Todas as raridades</option>
                <option value="Common">Comum</option>
                <option value="Uncommon">Incomum</option>
                <option value="Rare">Rara</option>
                <option value="Rare Ultra">Rara Ultra</option>
                <option value="Promo">Promocional</option>
            </select>
        </div>

        <h2>Minha Coleção</h2>
        
        <div class="grid" id="estoqueGrid">
            </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/estoque.js"></script>
</body>
</html>
